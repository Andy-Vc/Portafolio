<section id="contacto" class="section-shell" appRevealOnScroll (appRevealOnScroll)="visible.set(true)"
    [@sectionReveal]="visible() ? 'visible' : 'hidden'">
    <div class="grid gap-6 lg:grid-cols-[1fr_0.9fr] lg:items-start">
        <div class="rounded-[1.5rem] border border-surface-border bg-surface-card p-6 sm:p-8">
            <p class="text-sm font-medium uppercase tracking-[0.45em] text-foreground-muted">Contacto</p>
            <h2 class="mt-3 text-3xl font-semibold tracking-tight sm:text-4xl">Contacto simple.</h2>
            <p class="mt-4 max-w-2xl text-sm leading-7 text-foreground-secondary">
                Contacto directo por correo, LinkedIn, GitHub y CV.
            </p>
        </div>

        <div class="space-y-4">
            <article class="rounded-[1.5rem] border border-surface-border bg-surface-card p-6">
                <p class="text-xs uppercase tracking-[0.35em] text-foreground-muted">Canales</p>
                <div class="mt-4 grid gap-3">
                    @for (social of socials; track social.label) {
                    <a [href]="social.href"
                        class="flex items-center justify-between rounded-2xl border border-surface-border bg-surface-secondary px-4 py-3 text-sm text-foreground-primary transition duration-300 hover:bg-white/5 focus-ring"
                        target="_blank" rel="noopener noreferrer">
                        <span>{{ social.label }}</span>
                        <span class="text-foreground-muted">↗</span>
                    </a>
                    }
                </div>
            </article>

            <article class="rounded-[1.5rem] border border-surface-border bg-surface-card p-6">
                <p class="text-xs uppercase tracking-[0.35em] text-foreground-muted">CV</p>
                <p class="mt-4 text-sm leading-7 text-foreground-secondary">Añade aquí tu CV en PDF para descarga
                    directa.</p>
                <a href="assets/documents/CV_Andy_Valdivia.pdf" target="_blank" rel="noopener noreferrer"
                    class="mt-5 inline-flex items-center rounded-full bg-brand px-5 py-3 text-sm font-semibold text-white transition duration-300 hover:bg-brand-hover focus-ring">
                    Descargar CV
                </a>
            </article>
        </div>
    </div>
</section>
