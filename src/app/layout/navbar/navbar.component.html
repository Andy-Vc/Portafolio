<header
  class="fixed inset-x-0 top-0 z-50 border-b transition-all duration-300"
  [class.border-surface-border]="scrolled()"
  [class.border-transparent]="!scrolled()"
  [ngClass]="scrolled() ? 'bg-surface-secondary backdrop-blur-xl shadow-soft' : 'bg-transparent'"
>
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
    <button type="button" appScrollToSection="inicio" class="group flex items-center gap-3 focus-ring" aria-label="Ir al inicio">
      <span class="flex h-11 w-11 items-center justify-center rounded-2xl border border-surface-border bg-surface-card/90 text-sm font-semibold tracking-[0.28em] text-brand transition-transform duration-300 group-hover:scale-105">
        FP
      </span>
      <span class="hidden flex-col sm:flex">
        <span class="text-sm font-semibold text-foreground-primary">Portfolio</span>
        <span class="text-xs text-foreground-muted">Senior Full Stack Developer</span>
      </span>
    </button>

    <nav class="hidden items-center gap-1 rounded-full border border-surface-border bg-surface-card/70 p-1 text-sm text-foreground-secondary backdrop-blur-md lg:flex">
      @for (link of links; track link.href) {
        <button
          type="button"
          [appScrollToSection]="link.href.slice(1)"
          class="rounded-full px-4 py-2 transition duration-300 hover:bg-white/5 hover:text-foreground-primary focus-ring"
        >
          {{ link.label }}
        </button>
      }
    </nav>

    <div class="flex items-center gap-3">
      <button
        type="button"
        appScrollToSection="contacto"
        class="hidden rounded-full border border-brand/30 bg-brand/10 px-5 py-2.5 text-sm font-medium text-foreground-primary transition duration-300 hover:border-brand/50 hover:bg-brand/20 md:inline-flex focus-ring"
      >
        Hablemos
      </button>

      <button
        type="button"
        class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-surface-border bg-surface-card/80 text-foreground-primary transition duration-300 hover:border-brand/50 hover:bg-brand/10 lg:hidden focus-ring"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        aria-controls="mobile-menu"
        aria-label="Abrir menú"
      >
        <span class="flex flex-col gap-1.5">
          <span class="h-0.5 w-5 rounded-full bg-current"></span>
          <span class="h-0.5 w-5 rounded-full bg-current"></span>
          <span class="h-0.5 w-5 rounded-full bg-current"></span>
        </span>
      </button>
    </div>
  </div>

  <div
    id="mobile-menu"
    class="mx-auto max-w-7xl px-4 pb-4 transition-all duration-300 lg:hidden"
    [ngClass]="menuOpen() ? 'pointer-events-auto max-h-[32rem] opacity-100' : 'pointer-events-none max-h-0 opacity-0'"
  >
    <div class="glass-panel rounded-3xl p-3">
      <div class="grid gap-2 text-sm text-foreground-secondary">
        @for (link of links; track link.href) {
          <button
            type="button"
            [appScrollToSection]="link.href.slice(1)"
            class="rounded-2xl px-4 py-3 transition duration-300 hover:bg-white/5 hover:text-foreground-primary"
            (click)="closeMenu()"
          >
            {{ link.label }}
          </button>
        }
      </div>
    </div>
  </div>
</header>
