<footer class="relative overflow-hidden border-t border-surface-border bg-surface-secondary/70">
  <div
    class="pointer-events-none absolute -top-24 left-1/2 h-48 w-72 -translate-x-1/2 rounded-full bg-brand/10 blur-[100px]">
  </div>

  <div class="relative mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
    <div
      class="flex flex-col items-center gap-8 text-center lg:flex-row lg:items-center lg:justify-between lg:text-left">

      <div class="flex items-center gap-4">
        <div
          class="flex h-11 w-11 items-center justify-center rounded-2xl border border-surface-border bg-surface-card font-semibold tracking-[0.22em] text-brand">
          AV
        </div>
        <div>
          <p class="text-sm font-semibold text-foreground-primary">Andy Valdivia</p>
          <p class="mt-0.5 text-xs text-foreground-muted">Full Stack Developer</p>
        </div>
      </div>

      <div class="flex flex-wrap items-center justify-center gap-2.5">
        @for (social of socials; track social.label) {
        <a [href]="social.href"
          class="group flex items-center gap-2 rounded-full border border-surface-border bg-surface-card/80 px-4 py-2 text-sm text-foreground-secondary transition duration-300 hover:border-brand/40 hover:bg-white/5 hover:text-foreground-primary focus-ring"
          target="_blank" rel="noopener noreferrer">
          <span class="text-foreground-muted transition-colors duration-300 group-hover:text-brand">
            @switch (social.icon) {
            @case ('github') {
            <svg viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4">
              <path
                d="M12 2C6.48 2 2 6.58 2 12.25c0 4.53 2.87 8.37 6.84 9.73.5.1.68-.22.68-.49 0-.24-.01-1.04-.01-1.88-2.78.62-3.37-1.21-3.37-1.21-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.05 1.53 1.05.89 1.57 2.34 1.12 2.91.85.09-.66.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.05 0-1.11.38-2.03 1-2.74-.1-.26-.44-1.31.1-2.72 0 0 .82-.27 2.7 1.05a9.14 9.14 0 0 1 4.92 0c1.87-1.32 2.69-1.05 2.69-1.05.54 1.41.2 2.46.1 2.72.63.71 1 1.63 1 2.74 0 3.92-2.34 4.79-4.57 5.04.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.6.69.49A10.26 10.26 0 0 0 22 12.25C22 6.58 17.52 2 12 2Z" />
            </svg>
            }
            @case ('linkedin') {
            <svg viewBox="0 0 24 24" fill="currentColor" class="h-4 w-4">
              <path
                d="M4.98 3.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5ZM3 9.75h4v10.75H3zM10.5 9.75H14v1.6h.06c.5-.9 1.7-1.85 3.5-1.85 3.75 0 4.44 2.35 4.44 5.4v5.6h-4v-4.96c0-1.18-.02-2.7-1.65-2.7-1.65 0-1.9 1.28-1.9 2.6v5.06h-4V9.75Z" />
            </svg>
            }
            @case ('email') {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"
              stroke-linejoin="round" class="h-4 w-4">
              <rect x="3" y="5" width="18" height="14" rx="2" />
              <path d="m3 7 9 6 9-6" />
            </svg>
            }
            }
          </span>
          <span class="hidden sm:inline">{{ social.label }}</span>
        </a>
        }
      </div>
    </div>

    <div
      class="mt-8 flex flex-col items-center gap-4 border-t border-surface-border pt-6 lg:flex-row lg:justify-between">
      <p class="text-xs text-foreground-muted">© {{ year }} Andy Valdivia. Todos los derechos reservados.</p>
      <button type="button" (click)="scrollToTop()"
        class="inline-flex items-center gap-1.5 text-xs font-medium text-foreground-muted transition duration-300 hover:text-brand">
        Volver arriba
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" class="h-3.5 w-3.5">
          <path d="M12 19V5" />
          <path d="m5 12 7-7 7 7" />
        </svg>
      </button>
    </div>
  </div>
</footer>
